services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      POSTGRES_MULTIPLE_DATABASES: auth_db,product_db,order_db,payment_db,shipping_db
    ports:
      - "5432:5432"
    volumes:
      - ./scripts/create-multiple-postgres-dbs.sh:/docker-entrypoint-initdb.d/create-multiple-postgres-dbs.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  service-registry:
    build: ./service-registry
    ports:
      - "8761:8761"

  api-gateway:
    build: ./api-gateway
    depends_on:
      - service-registry
    ports:
      - "8080:8080"

  order-service:
    build: ./order-service
    depends_on:
      - postgres
      - kafka
      - service-registry
    ports:
      - "8081:8081"

  auth-service:
    build: ./auth-service
    depends_on:
      - postgres
      - service-registry
    ports:
      - "8086:8086"

  product-service:
    build: ./product-service
    depends_on:
      - postgres
      - service-registry
    ports:
      - "8087:8087"

  inventory-service:
    build: ./inventory-service
    depends_on:
      - mongodb
      - kafka
      - service-registry
    ports:
      - "8082:8082"

  payment-service:
    build: ./payment-service
    depends_on:
      - postgres
      - kafka
      - service-registry
    ports:
      - "8083:8083"

  shipping-service:
    build: ./shipping-service
    depends_on:
      - postgres
      - kafka
      - service-registry
    ports:
      - "8084:8084"

  notification-service:
    build: ./notification-service
    depends_on:
      - mongodb
      - redis
      - kafka
      - service-registry
    ports:
      - "8085:8085"
