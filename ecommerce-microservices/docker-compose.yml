services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
      POSTGRES_MULTIPLE_DATABASES: auth_db,product_db,order_db,payment_db,shipping_db
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./scripts/create-multiple-postgres-dbs.sh:/docker-entrypoint-initdb.d/create-multiple-postgres-dbs.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "${ZOOKEEPER_PORT:-2181}:2181"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 12

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - bash
      - -c
      - |
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic order-events --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic inventory-events --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic payment-events --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic shipping-events --partitions 1 --replication-factor 1

  service-registry:
    build: ./service-registry
    ports:
      - "${SERVICE_REGISTRY_PORT:-8761}:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15

  api-gateway:
    build: ./api-gateway
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev-only-jwt-secret-replace-before-production}
    depends_on:
      service-registry:
        condition: service_healthy
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"

  order-service:
    build: ./order-service
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev-only-jwt-secret-replace-before-production}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      service-registry:
        condition: service_healthy
    ports:
      - "${ORDER_SERVICE_PORT:-8081}:8081"

  auth-service:
    build: ./auth-service
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev-only-jwt-secret-replace-before-production}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
    depends_on:
      postgres:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    ports:
      - "${AUTH_SERVICE_PORT:-8086}:8086"

  product-service:
    build: ./product-service
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
    depends_on:
      postgres:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    ports:
      - "${PRODUCT_SERVICE_PORT:-8087}:8087"

  inventory-service:
    build: ./inventory-service
    depends_on:
      mongodb:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      service-registry:
        condition: service_healthy
    ports:
      - "${INVENTORY_SERVICE_PORT:-8082}:8082"

  payment-service:
    build: ./payment-service
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      service-registry:
        condition: service_healthy
    ports:
      - "${PAYMENT_SERVICE_PORT:-8083}:8083"

  shipping-service:
    build: ./shipping-service
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      service-registry:
        condition: service_healthy
    ports:
      - "${SHIPPING_SERVICE_PORT:-8085}:8085"

  notification-service:
    build: ./notification-service
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      service-registry:
        condition: service_healthy
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-8084}:8084"
