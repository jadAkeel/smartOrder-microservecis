server:
  port: 8761

spring:
  application:
    name: service-registry
  cloud:
    service-registry:
      auto-registration:
        enabled: false
  output:
    ansi:
      enabled: always

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
  server:
    wait-time-in-ms-when-sync-empty: 0
